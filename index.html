<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELL Interactive Lesson</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --secondary: #50E3C2; --bg: #F4F7F9; --error: #FF4B2B; --success: #28a745; --listening: #9b59b6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 700px; }
        
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: left; }
        
        /* Clean Lesson Formatting */
        .lesson-header { color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .lesson-section { color: #333; margin-top: 20px; margin-bottom: 5px; font-size: 1.2rem; }
        .lesson-text { font-size: 1rem; line-height: 1.6; color: #444; }
        
        .btn { border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; margin: 10px 0; width: 100%; }
        .btn-listen { background: var(--listening); color: white; }
        .btn-submit { background: var(--success); color: white; }
        
        .q-block { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .q-option { display: block; margin-bottom: 8px; cursor: pointer; padding: 12px; border-radius: 8px; background: #f9f9f9; border: 1px solid #ddd; transition: 0.2s; }
        .q-option:hover { background: #f0f8ff; border-color: var(--primary); }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <button class="btn btn-listen" id="readLessonBtn" onclick="readLessonAloud()">🔊 Read Lesson Aloud</button>
        <div id="lessonContent" class="lesson-text">Loading lesson details...</div>
    </div>

    <div class="card">
        <h2 id="taskTitle" style="text-align: center;">Task Loading...</h2>
        
        <div id="listeningUI" style="display: none;">
            <button class="btn btn-listen" onclick="playAudioTask()">🔊 1. Play Audio Story</button>
            <button class="btn btn-listen" style="background: #8e44ad;" onclick="playListeningQuestion()">❓ 2. Play Question & Options</button>
            
            <div class="q-block">
                <p id="listeningQuestionText" style="font-weight: bold; font-size: 1.1rem;"></p>
                <div id="listeningOptions"></div>
            </div>
            <button class="btn btn-submit" onclick="submitListeningTask()">Submit Answer</button>
        </div>

        <div id="speakingUI" style="display: none;"><p>Speaking UI temporarily disabled for upgrades.</p></div>
        <div id="writingUI" style="display: none;"><p>Writing UI temporarily disabled for upgrades.</p></div>
        <div id="comprehensionUI" style="display: none;"><p>Comprehension UI temporarily disabled for upgrades.</p></div>

        <div id="status"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvucmpyniDeXtsY8fSIBVU57o0qfXtyIEXEoM0Pf2-sb3JbfnRQtY5ax1tj0C8fCJ9zw/exec"; 
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lessonId');
    const studentId = urlParams.get('studentId');
    const taskType = urlParams.get('taskType');

    let audioScriptText = "";
    let listeningQuestionText = "";
    let cleanLessonTextForTTS = "";

    async function loadData() {
        document.getElementById('status').innerText = "Fetching data from Google Sheets...";
        try {
            const response = await fetch(`${SCRIPT_URL}?lessonId=${lessonId}`);
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('lessonContent').innerText = "Error: " + data.error;
                return;
            }

            // 1. Format the Lesson Core (Title through Vocab)
            formatAndDisplayLesson(data.fullLesson);

            // 2. Route UI
            document.getElementById('status').innerText = "";
            if (taskType === 'listening') {
                document.getElementById('listeningUI').style.display = "block";
                document.getElementById('taskTitle').innerText = '🎧 Listening Task';
                parseListening(data.fullLesson);
            } else if (taskType === 'writing') {
                document.getElementById('writingUI').style.display = "block";
                document.getElementById('taskTitle').innerText = '✍️ Writing Task';
            } else if (taskType === 'comprehension') {
                document.getElementById('comprehensionUI').style.display = "block";
                document.getElementById('taskTitle').innerText = '🧠 Comprehension Task';
            } else {
                document.getElementById('speakingUI').style.display = "block";
                document.getElementById('taskTitle').innerText = '🗣️ Speaking Task';
            }
        } catch (e) { 
            document.getElementById('status').innerText = "Error loading data. Check console."; 
            console.error(e);
        }
    }

    function formatAndDisplayLesson(rawText) {
        // Chop off everything below the Listening Task
        let coreLesson = rawText.split("🎧 LISTENING TASK")[0].trim();
        cleanLessonTextForTTS = coreLesson.replace(/[\*#]/g, ''); // Save clean version for text-to-speech

        // Convert Markdown to beautiful HTML
        coreLesson = coreLesson.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); // Bold
        coreLesson = coreLesson.replace(/(🎯 TITLE:.*)/g, '<h3 class="lesson-header">$1</h3>');
        coreLesson = coreLesson.replace(/(📖 ANCHOR)/g, '<h4 class="lesson-section">$1</h4>');
        coreLesson = coreLesson.replace(/(📝 SUMMARY)/g, '<h4 class="lesson-section">$1</h4>');
        coreLesson = coreLesson.replace(/(🧠 ACADEMIC VOCABULARY)/g, '<h4 class="lesson-section">$1</h4>');
        
        // Preserve line breaks
        coreLesson = coreLesson.replace(/\n/g, '<br>');
        
        document.getElementById('lessonContent').innerHTML = coreLesson;
    }

    function parseListening(text) {
        // Extract script and question securely
        const scriptMatch = text.match(/<AUDIO_SCRIPT>([\s\S]*?)<\/AUDIO_SCRIPT>/);
        const questionMatch = text.match(/<QUESTION>([\s\S]*?)<\/QUESTION>/);
        
        audioScriptText = scriptMatch ? scriptMatch[1].trim() : "Audio script not found.";
        listeningQuestionText = questionMatch ? questionMatch[1].trim() : "Question not found.";
        
        document.getElementById('listeningQuestionText').innerText = listeningQuestionText;

        // Extract multiple choice options
        const optionsArea = text.split("</QUESTION>")[1]?.split("🗣️ SPEAKING TASK")[0] || "";
        const options = optionsArea.match(/[A-D]\) .+/g) || [];
        
        let optionsHTML = "";
        options.forEach(opt => {
            optionsHTML += `<label class="q-option"><input type="radio" name="listenOpt" value="${opt}"> ${opt}</label>`;
        });
        document.getElementById('listeningOptions').innerHTML = optionsHTML;
    }

    // --- TEXT TO SPEECH (TTS) LOGIC ---
    function speakText(val) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(val);
        window.speechSynthesis.speak(msg);
    }
    
    function readLessonAloud() { speakText(cleanLessonTextForTTS); }
    function playAudioTask() { speakText(audioScriptText); }
    function playListeningQuestion() { 
        // Read question + options
        let optionsText = Array.from(document.querySelectorAll('.q-option')).map(el => el.innerText).join(". ");
        speakText(listeningQuestionText + ". Here are your options: " + optionsText); 
    }

    async function submitListeningTask() {
        const selected = document.querySelector('input[name="listenOpt"]:checked');
        if(!selected) return alert("Please select an answer.");
        
        document.getElementById('status').innerText = "Submitting answer to Google Sheets...";
        
        const payload = { studentId, lessonId, prompt: listeningQuestionText, studentAnswers: selected.value, taskType: "Comprehension", type: "assessment" };
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        
        document.getElementById('status').innerText = "✅ Submitted successfully! You may close this window.";
    }

    window.onload = loadData;
</script>
</body>
</html>
