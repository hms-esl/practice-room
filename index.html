<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELPA21 Listening Task</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        
        .student-header { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c2d7f9; }
        .student-header h2 { margin: 0; color: #1967d2; font-size: 1.4em; }
        .student-header p { margin: 5px 0 0; color: #5f6368; font-size: 0.9em; font-weight: bold; }

        .lesson-box { background: #ffffff; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #dce6f1; text-align: left; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .lesson-box h3 { margin: 0 0 15px 0; color: #1967d2; font-size: 1.3em; border-bottom: 2px solid #e8f0fe; padding-bottom: 8px; }
        .lesson-content { color: #333; font-size: 1.05em; line-height: 1.6; }
        .lesson-section-title { font-weight: bold; color: #1967d2; margin-top: 15px; margin-bottom: 5px;}
        
        .prompt-box { background: #fff3cd; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #ffeeba; text-align: left; }
        .prompt-box h3 { margin: 0 0 15px 0; color: #856404; font-size: 1.2em; border-bottom: 1px solid #ffeeba; padding-bottom: 8px; }
        .prompt-box p { margin: 0; color: #533f03; font-size: 1.05em; line-height: 1.4; font-weight: bold; }

        .btn-listen { background: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; margin-right: 10px; font-weight: bold; font-size: 1em; transition: background-color 0.2s;}
        .btn-listen:hover { background: #45a049; }
        .btn-submit { background: #1967d2; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; width: 100%; margin-top: 15px; transition: background-color 0.2s;}
        .btn-submit:hover { background: #1557b0; }
        
        textarea { width: 100%; height: 100px; margin-top: 15px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; font-size: 1em; box-sizing: border-box; resize: vertical;}
        
        #status { margin-top: 15px; color: #555; font-weight: bold; min-height: 1.2em; }
        #response { margin-top: 20px; padding: 15px; background-color: #f9f9f9; border-radius: 8px; border-left: 5px solid #34a853; text-align: left; display: none; font-size: 1.05em; line-height: 1.4; color: #333; }
        .score-display { font-weight: bold; font-size: 1.2em; color: #1967d2; margin-bottom: 10px; display: block; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="student-header">
        <h2 id="display-name">Hello, Student!</h2>
        <p id="display-id">ID: Checking...</p>
    </div>

    <div class="lesson-box" id="lesson-box">
        <h3>📚 Today's Lesson</h3>
        <div id="full-lesson-text">Loading your lesson materials...</div>
    </div>

    <div class="prompt-box" id="prompt-box">
        <h3>🎧 Listening Task</h3>
        
        <div style="margin-bottom: 15px;">
            <button class="btn-listen" onclick="playAudio('story')">▶️ Play Story</button>
            <button class="btn-listen" onclick="playAudio('question')">▶️ Play Question</button>
        </div>

        <p id="question-text">Loading your question...</p>
        <p id="scaffold-options" style="font-weight: normal; color: #444; margin-top: 10px;"></p>

        <textarea id="studentAnswer" placeholder="Type your answer here..."></textarea>
        
        <button class="btn-submit" onclick="submitTask()">Submit Answer</button>
        <div id="status"></div>
    </div>

    <div id="response"></div>
</div>

<script>
    // 1. YOUR SETTINGS
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEVT8PObx2cNMS-fnJThz1BPnvxnMXFwdl7nXHnKfzv8V9EvMuYH_tupIgkaYnLAz1/exec";

    // 2. GRAB DATA FROM THE URL
    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('studentId') || "Unknown";
    const studentName = urlParams.get('studentName') || "Student";
    const lessonId = urlParams.get('lessonId') || "Lsn_001";
    
    let audioData = { story: "", question: "" };
    let activeQuestion = ""; 

    // 3. UPDATE THE HEADER
    document.getElementById('display-name').innerText = "Welcome, " + studentName + "!";
    document.getElementById('display-id').innerText = "Student ID: " + studentId;

    // 4. FETCH THE LESSON AND EXTRACT SECTIONS
    async function fetchLessonPrompt() {
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL + "?lessonId=" + lessonId);
            const data = await res.json();
            const fullLesson = data.fullLesson; // Updated to match Code.gs

            if (fullLesson && fullLesson !== "Lesson not found.") {
                
                // --- Extract "Today's Lesson" Pieces ---
                let anchorText = fullLesson.split("📖 ANCHOR")[1]?.split("📝 SUMMARY")[0]?.trim() || "";
                let summaryText = fullLesson.split("📝 SUMMARY")[1]?.split("🧠 ACADEMIC VOCABULARY")[0]?.trim() || "";
                let vocabText = fullLesson.split("🧠 ACADEMIC VOCABULARY")[1]?.split("🎧 LISTENING TASK")[0]?.trim() || "";
                
                document.getElementById('full-lesson-text').innerHTML = `
                    <div class="lesson-section-title">📖 Anchor</div>
                    <div class="lesson-content">${anchorText}</div>
                    <div class="lesson-section-title">📝 Summary</div>
                    <div class="lesson-content">${summaryText}</div>
                    <div class="lesson-section-title">🧠 Academic Vocabulary</div>
                    <div class="lesson-content">${vocabText.replace(/\n/g, '<br>')}</div>
                `;

                // --- Extract "Listening Task" Pieces ---
                audioData.story = fullLesson.match(/<AUDIO_SCRIPT>([\s\S]*?)<\/AUDIO_SCRIPT>/)?.[1]?.trim() || "";
                audioData.question = fullLesson.match(/<QUESTION>([\s\S]*?)<\/QUESTION>/)?.[1]?.trim() || "";
                activeQuestion = audioData.question;
                
                // Get the multiple choice options if they exist
                let optionsText = fullLesson.split("<\/QUESTION>")[1]?.split("🗣️ SPEAKING TASK")[0]?.trim() || "";

                document.getElementById('question-text').innerText = audioData.question;
                // Strip out formatting brackets from options if necessary and format cleanly
                document.getElementById('scaffold-options').innerHTML = optionsText.replace(/\n/g, '<br>');

            } else {
                document.getElementById('full-lesson-text').innerHTML = "We couldn't find this lesson. Please check with your teacher.";
                document.getElementById('question-text').innerText = "No listening task found.";
            }

        } catch (err) {
            document.getElementById('full-lesson-text').innerHTML = "Network error: Could not load the lesson.";
            document.getElementById('question-text').innerText = "Network error.";
        }
    }

    fetchLessonPrompt();

    // 5. TEXT-TO-SPEECH LOGIC
    function playAudio(type) {
        window.speechSynthesis.cancel(); 
        let textToRead = type === 'story' ? audioData.story : audioData.question;
        
        if(!textToRead) {
            alert("Audio is still loading or not available for this lesson.");
            return;
        }

        let utterance = new SpeechSynthesisUtterance(textToRead);
        utterance.lang = 'en-US';
        // Optional: Slow down the speech rate slightly for ELL students
        utterance.rate = 0.9; 
        window.speechSynthesis.speak(utterance);
    }

    // 6. SUBMIT TO AI FOR GRADING
    async function submitTask() {
        const answerText = document.getElementById('studentAnswer').value.trim();
        const statusDiv = document.getElementById('status');
        const responseDiv = document.getElementById('response');
        
        if(!answerText) {
            statusDiv.innerText = "Please type your answer before submitting.";
            statusDiv.style.color = "red";
            return;
        }

        statusDiv.innerText = "Submitting to AI Teacher for grading... Please wait.";
        statusDiv.style.color = "#1967d2";
        responseDiv.style.display = "none";

        try {
            const res = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    studentId: studentId,
                    studentName: studentName,
                    lessonId: lessonId,
                    type: 'assessment',
                    taskType: 'Listening',  // <-- Ensures it logs correctly in your sheet
                    prompt: activeQuestion, 
                    text: answerText
                })
            });
            
            const data = await res.json();
            
            statusDiv.innerText = "Grading Complete!";
            statusDiv.style.color = "green";
            
            responseDiv.innerHTML = "<span class='score-display'>ELPA21 Score: " + (data.score || "Pending") + " / 5</span>" + (data.reply || "No feedback generated.");
            responseDiv.style.display = "block";
            
        } catch (err) {
            statusDiv.innerText = "Error saving to sheet. Please try again.";
            statusDiv.style.color = "red";
            console.error(err);
        }
    }
</script>

</body>
</html>
