<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELL Interactive Lesson</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --secondary: #50E3C2; --bg: #F4F7F9; --error: #FF4B2B; --success: #28a745; --writing: #f39c12; --listening: #9b59b6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; }
        
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .lesson-card { text-align: left; }
        .lesson-text { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; color: #333; }
        
        .btn { border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; margin: 10px 0; width: 100%; }
        .btn-listen { background: var(--listening); color: white; }
        .btn-record { background: var(--primary); color: white; }
        .btn-writing { background: var(--writing); color: white; }
        
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .recording { background: var(--error) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        #status { margin-top: 15px; font-size: 0.9rem; color: #666; min-height: 40px; font-weight: bold;}
        #feedback-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: #eef7ff; display: none; text-align: left; }
        
        /* Quiz & UI Components */
        .q-block { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .q-text { font-weight: 600; margin-bottom: 10px; }
        .q-option { display: block; margin-bottom: 8px; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; border: 1px solid transparent;}
        .q-option:hover { background: #f0f8ff; border: 1px solid var(--primary); }
        .ai-feedback { margin-top: 10px; padding: 12px; border-radius: 4px; font-size: 0.9rem; display: none; }
        
        /* Writing Styles */
        textarea { width: 100%; height: 150px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; font-family: inherit; resize: vertical; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card lesson-card">
        <button id="readLessonBtn" class="btn btn-listen" onclick="speakText(document.getElementById('lessonContent').innerText)" style="display:none; margin-bottom: 15px;">🔊 Read Lesson Aloud</button>
        <h2 id="lessonTitle">📚 Today's Lesson</h2>
        <div id="lessonContent" class="lesson-text">Loading...</div>
    </div>

    <div class="card">
        <h2 id="taskTitle">Task Loading...</h2>
        
        <div id="speakingUI" style="display: none;">
            <p id="promptText" style="font-style: italic; color: #555;">Fetching prompt...</p>
            <button class="btn btn-listen" onclick="speakText(currentPrompt)">🔊 Listen to Prompt</button>
            <button id="recordBtn" class="btn btn-record" onclick="toggleRecording()">🎤 Start Recording</button>
        </div>

        <div id="listeningUI" style="display: none;">
            <button class="btn btn-listen" onclick="playAudioTask()">🔊 Play Audio Story</button>
            <button class="btn btn-listen" onclick="readAllQuestions()">🔊 Read Questions & Options</button>
            <div id="listeningQuizContainer" style="margin-top: 15px;"></div>
            <button id="submitListenBtn" class="btn btn-record" onclick="submitAutoQuiz()" style="display:none;">Submit Answers</button>
        </div>

        <div id="writingUI" style="display: none;">
            <p id="writingPrompt" style="font-style: italic; color: #555;"></p>
            <textarea id="writingInput" placeholder="Type your answer here..."></textarea>
            <button id="submitWritingBtn" class="btn btn-writing" onclick="submitTextTask('writing')">Submit Writing</button>
        </div>

        <div id="comprehensionUI" style="display: none;">
            <div id="quizContainer"></div>
            <button id="submitQuizBtn" class="btn btn-record" onclick="submitAutoQuiz()" style="display:none;">Submit Quiz</button>
        </div>

        <div id="status">Ready!</div>
        <div id="feedback-box">
            <strong>AI Feedback: <span id="scoreDisplay">-</span></strong>
            <p id="replyDisplay"></p>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvucmpyniDeXtsY8fSIBVU57o0qfXtyIEXEoM0Pf2-sb3JbfnRQtY5ax1tj0C8fCJ9zw/exec"; 
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lessonId');
    const studentId = urlParams.get('studentId');
    
    const rawTaskType = urlParams.get('taskType') || 'speaking';
    const taskType = rawTaskType.trim().toLowerCase();

    let currentPrompt = "";
    let audioScript = "";
    let isRecording = false;
    let recognition;
    let quizQuestions = [];
    
    // Two-Attempt Tracker
    let attemptCount = 1;
    let attemptsData = { attempt1: "", attempt2: "" };

    async function loadData() {
        try {
            const response = await fetch(`${SCRIPT_URL}?lessonId=${lessonId}`);
            const data = await response.json();
            
            // Clip reading text to hide the task headers from the main text view
            const readingMatch = data.fullLesson.split(/🎧\s*LISTENING TASK|LISTENING TASK/i);
            const readingMaterialOnly = readingMatch[0].trim();
            document.getElementById('lessonContent').innerText = readingMaterialOnly;

            // ELPA21 Guardrail: Only show read aloud for non-comprehension tasks
            if (taskType !== 'comprehension') {
                document.getElementById('readLessonBtn').style.display = "block";
            }

            // Route UI
            if (taskType === 'comprehension') {
                showUI('comprehensionUI', '🧠 Comprehension Task');
                const compRegex = /COMPREHENSION TASK([\s\S]*?)(?:📝\s*WRITING TASK|WRITING TASK|$)/i;
                const match = data.fullLesson.match(compRegex);
                const isolatedComp = match ? match[1] : "";
                buildUniversalQuiz(isolatedComp, 'quizContainer', 'submitQuizBtn');
                
            } else if (taskType === 'listening') {
                showUI('listeningUI', '🎧 Listening Task');
                parseListening(data.fullLesson);
                
            } else if (taskType === 'writing') {
                showUI('writingUI', '✍️ Writing Task');
                parseWriting(data.fullLesson);
                
            } else {
                showUI('speakingUI', '🗣️ Speaking Task');
                parseSpeaking(data.fullLesson);
            }
        } catch (e) { 
            console.error(e);
            document.getElementById('status').innerText = "Error loading data."; 
        }
    }

    function showUI(id, title) {
        document.getElementById(id).style.display = "block";
        document.getElementById('taskTitle').innerText = title;
    }

    function parseSpeaking(text) {
        const parts = text.split(/🗣️\s*SPEAKING TASK|SPEAKING TASK/i);
        currentPrompt = parts[1] ? parts[1].split("❓")[0].trim() : "Explain what you learned today.";
        document.getElementById('promptText').innerText = currentPrompt;
    }

    function parseWriting(text) {
        const parts = text.split(/📝\s*WRITING TASK|WRITING TASK/i);
        const prompt = parts[1] || "Write 3-5 sentences about the lesson.";
        document.getElementById('writingPrompt').innerText = prompt.trim();
    }

    function parseListening(text) {
        audioScript = text.match(/<AUDIO_SCRIPT>([\s\S]*?)<\/AUDIO_SCRIPT>/i)?.[1] || "";
        // FIXED: Regex now accounts for all tasks so Listening never accidentally grabs Comprehension
        const quizAreaMatch = text.match(/LISTENING TASK([\s\S]*?)(?:🗣️\s*SPEAKING TASK|SPEAKING TASK|❓\s*COMPREHENSION TASK|COMPREHENSION TASK|📝\s*WRITING TASK|WRITING TASK|$)/i);
        let quizArea = quizAreaMatch ? quizAreaMatch[1] : "";
        quizArea = quizArea.replace(/<AUDIO_SCRIPT>[\s\S]*?<\/AUDIO_SCRIPT>/i, "");
        buildUniversalQuiz(quizArea, 'listeningQuizContainer', 'submitListenBtn');
    }

    function speakText(val) {
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(val);
        window.speechSynthesis.speak(msg);
    }

    function playAudioTask() { speakText(audioScript); }

    function readAllQuestions() {
        let textToRead = "";
        quizQuestions.forEach((q, i) => {
            textToRead += `Question ${i + 1}. ${q.question}. `;
            q.options.forEach(opt => {
                textToRead += `Option ${opt.letter}. ${opt.text}. `;
            });
        });
        speakText(textToRead);
    }

    // ==========================================
    // UNIFIED BUILDER: Auto-Extracts Questions & Keys
    // ==========================================
    function buildUniversalQuiz(rawText, containerId, btnId) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        quizQuestions = [];

        let cleanText = rawText.replace(/<\/?QUESTION>/gi, "\n");
        let blocks = cleanText.split(/\n\s*\d+\.\s+/).filter(b => b.trim().length > 10);
        
        if (blocks.length === 0) {
            blocks = cleanText.split(/(?:^|\s)\d+\.\s+/).filter(b => b.trim().length > 10);
        }

        if (blocks.length === 0) {
            container.innerHTML = "<p style='color:red;'>Oops! Could not parse the questions. Please check the AI lesson format.</p>";
            return;
        }

        blocks.forEach((block, index) => {
            const qSplit = block.split(/(?=\n?\s*A[\)\.])|(?=\s+A[\)\.])/i);
            const questionText = qSplit[0].trim();
            const restOfBlock = qSplit.slice(1).join(" ");

            const feedbackSplit = restOfBlock.split(/Answers?:/i);
            const optionsSection = feedbackSplit[0];
            const answerAndFeedback = feedbackSplit[1] ? "Answers: " + feedbackSplit[1] : "";

            const options = [];
            const optionRegex = /([A-E][\)\.])\s*([\s\S]+?)(?=(?:\n?\s*[A-E][\)\.])|$)/g;
            let match;
            while ((match = optionRegex.exec(optionsSection)) !== null) {
                options.push({ letter: match[1].charAt(0).toUpperCase(), text: match[2].trim() });
            }

            let correctAnswer = null;
            let feedbackText = "Feedback was not provided.";
            
            // FIXED: Catches "Answer: A", "Correct Answer: A", "Answers : A", etc.
            const ansRegex = /(?:Correct\s*)?Answers?.*?(?:[A-E]\)|\b[A-E]\b)/i;
            const ansMatch = answerAndFeedback.match(ansRegex);
            if (ansMatch) {
                const letterMatch = ansMatch[0].match(/[A-E]/i);
                if (letterMatch) correctAnswer = letterMatch[0].toUpperCase();
            }

            // FIXED: Catches "Feedback:" or "Explanation:"
            const fbRegex = /(?:Feedback|Explanation):\s*([\s\S]*)/i;
            const fbMatch = answerAndFeedback.match(fbRegex);
            if (fbMatch) feedbackText = fbMatch[1].trim();

            if (options.length > 0) {
                quizQuestions.push({ 
                    question: questionText, 
                    options: options, 
                    correctLetter: correctAnswer, 
                    feedback: feedbackText, 
                    selectedLetter: null 
                });
                
                let qHTML = `<div class="q-block" id="qBlock_${index}">
                    <div class="q-text">${index + 1}. ${questionText}</div>`;
                
                options.forEach((opt) => {
                    qHTML += `<label class="q-option">
                        <input type="radio" name="q_${index}" value="${opt.letter}" onchange="selectOption(${index}, '${opt.letter}')"> 
                        ${opt.letter}) ${opt.text}
                    </label>`;
                });
                
                qHTML += `<div id="qFeedback_${index}" class="ai-feedback"></div></div>`;
                container.innerHTML += qHTML;
            }
        });

        if (quizQuestions.length > 0) {
            document.getElementById(btnId).style.display = "block";
        }
    }

    function selectOption(qIndex, letter) {
        quizQuestions[qIndex].selectedLetter = letter;
    }

    // ==========================================
    // BATCHED SUBMISSION: HINTS & TWO-ATTEMPT LOGIC
    // ==========================================
    async function submitAutoQuiz() {
        document.getElementById('status').innerText = "Grading...";
        const submitBtnId = taskType === 'comprehension' ? 'submitQuizBtn' : 'submitListenBtn';
        document.getElementById(submitBtnId).disabled = true;
        
        for (let i = 0; i < quizQuestions.length; i++) {
            if (!quizQuestions[i].selectedLetter) {
                alert("Please answer all questions before submitting.");
                document.getElementById('status').innerText = "Waiting for completion.";
                document.getElementById(submitBtnId).disabled = false;
                return;
            }
        }

        let currentScore = 0;
        let studentAnswersRecord = `Attempt ${attemptCount}: `;
        let allCorrect = true;
        
        // Check answers locally
        for (let i = 0; i < quizQuestions.length; i++) {
            const q = quizQuestions[i];
            studentAnswersRecord += `Q${i+1}: ${q.selectedLetter}. `;
            if (q.correctLetter && q.selectedLetter === q.correctLetter) {
                currentScore++;
            } else {
                allCorrect = false;
            }
        }

        // --- ATTEMPT 1 LOGIC (If they made mistakes) ---
        if (attemptCount === 1 && !allCorrect) {
            attemptsData.attempt1 = studentAnswersRecord;
            document.getElementById('status').innerText = "Generating AI hints for your missed questions... ⏳";
            
            // Bundle ALL wrong questions into ONE API request to stop Quota Crashes
            let wrongQuestionsSummary = "";
            for (let i = 0; i < quizQuestions.length; i++) {
                const q = quizQuestions[i];
                if (!(q.correctLetter && q.selectedLetter === q.correctLetter)) {
                    const wrongOpt = q.options.find(o => o.letter === q.selectedLetter);
                    const wrongText = wrongOpt ? wrongOpt.text : "No selection";
                    wrongQuestionsSummary += `Question ${i+1}: ${q.question} | Student incorrectly guessed: ${wrongText}\n`;
                }
            }

            let hintText = "Revisit the material and try again!";
            
            // FIXED: Dynamically tell the AI which text to look at!
            let hintContextName = taskType === 'comprehension' ? "reading text" : "audio script";

            try {
                const hintResponse = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        studentId: studentId,
                        lessonId: lessonId,
                        taskType: "hint", 
                        prompt: `I missed the following questions. Look at the ${hintContextName} from the lesson and give me a brief, 1-sentence hint for EACH question to guide my thinking without giving away the direct answer.`,
                        text: wrongQuestionsSummary, 
                        type: "assessment"
                    })
                });
                const hintResult = await hintResponse.json();
                if(hintResult.reply && !hintResult.reply.includes("API Error")) {
                    hintText = hintResult.reply;
                } else if (hintResult.reply && hintResult.reply.includes("Quota exceeded")) {
                    hintText = "The AI tutor is a little busy right now! Please re-read the passage and try again.";
                }
            } catch(e) { console.error(e); }
            
            // Show Feedback Under Questions
            for (let i = 0; i < quizQuestions.length; i++) {
                const q = quizQuestions[i];
                const fbBox = document.getElementById(`qFeedback_${i}`);
                fbBox.style.display = "block";
                
                if (q.correctLetter && q.selectedLetter === q.correctLetter) {
                    fbBox.style.borderLeftColor = "var(--success)";
                    fbBox.style.backgroundColor = "#e8f5e9";
                    fbBox.innerHTML = `<strong>✅ Correct!</strong>`;
                } else {
                    fbBox.style.borderLeftColor = "var(--writing)";
                    fbBox.style.backgroundColor = "#fff3cd";
                    fbBox.innerHTML = `<strong>❌ Incorrect.</strong> Check the hint below!`;
                }
            }
            
            // Show the bundled AI Hints in the main feedback box at the bottom
            document.getElementById('feedback-box').style.display = "block";
            document.getElementById('feedback-box').style.borderLeftColor = "var(--writing)";
            document.getElementById('feedback-box').style.backgroundColor = "#fff3cd";
            document.getElementById('scoreDisplay').innerText = `Attempt 1: ${currentScore} out of ${quizQuestions.length}`;
            document.getElementById('replyDisplay').innerHTML = `<strong>💡 AI Hints:</strong><br><br>${hintText.replace(/\n/g, '<br>')}`;
            
            attemptCount = 2;
            document.getElementById('status').innerText = "Review your hints, correct your mistakes, and submit Attempt 2.";
            document.getElementById(submitBtnId).innerText = "Submit Attempt 2";
            document.getElementById(submitBtnId).disabled = false;
            return;
        }

        // --- FINAL SUBMISSION (Attempt 2, or Perfect Attempt 1) ---
        if (attemptCount === 1) {
            attemptsData.attempt1 = studentAnswersRecord;
        } else {
            attemptsData.attempt2 = studentAnswersRecord;
        }

        // Display Full AI Feedback & Correct Answers
        for (let i = 0; i < quizQuestions.length; i++) {
            const q = quizQuestions[i];
            const fbBox = document.getElementById(`qFeedback_${i}`);
            fbBox.style.display = "block";
            
            if (q.correctLetter && q.selectedLetter === q.correctLetter) {
                fbBox.style.borderLeftColor = "var(--success)";
                fbBox.style.backgroundColor = "#e8f5e9";
                fbBox.innerHTML = `<strong>✅ Correct!</strong> ${q.feedback}`;
            } else {
                // FIXED: Break the circular loop! This guarantees Attempt 2 updates, even if the correct letter parse failed.
                fbBox.style.borderLeftColor = "var(--error)";
                fbBox.style.backgroundColor = "#ffebee";
                const displayCorrect = q.correctLetter ? `The correct answer was <strong>${q.correctLetter}</strong>.` : `<em>(Correct answer key could not be loaded)</em>.`;
                fbBox.innerHTML = `<strong>❌ Incorrect.</strong> ${displayCorrect} <br>${q.feedback}`;
            }
        }
        
        const finalScoreText = `${currentScore} out of ${quizQuestions.length}`;
        document.getElementById('status').innerText = `Done! Final Score: ${finalScoreText}`;
        
        // Reset Feedback Box styling and show final score
        document.getElementById('feedback-box').style.borderLeftColor = "var(--primary)";
        document.getElementById('feedback-box').style.backgroundColor = "#eef7ff";
        showFeedback({score: finalScoreText, reply: "Scores have been recorded. Check individual questions for correct answers and feedback!"});

        // Fast-Lane: Send combined attempts to the spreadsheet instantly
        let combinedTextForSheet = attemptsData.attempt1;
        if (attemptsData.attempt2) combinedTextForSheet += " | " + attemptsData.attempt2;

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    studentId: studentId,
                    lessonId: lessonId,
                    taskType: taskType, 
                    prompt: "Multiple Choice Questions",
                    text: combinedTextForSheet, 
                    score2: finalScoreText,     
                    type: "assessment"
                })
            });
        } catch(e) { console.error("Logging error", e); }

        document.getElementById(submitBtnId).style.display = "none";
        document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
    }

    // --- TEXT / AUDIO SUBMISSIONS ---
    async function submitTextTask(type) {
        const text = type === 'writing' ? document.getElementById('writingInput').value : "";
        if(!text) return alert("Please enter some text.");
        
        document.getElementById('status').innerText = "AI is evaluating...";
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ studentId, lessonId, prompt: document.getElementById('writingPrompt').innerText, text, taskType: "writing", type: "assessment" })
        });
        const result = await response.json();
        showFeedback(result);
    }

    function showFeedback(result) {
        document.getElementById('feedback-box').style.display = "block";
        document.getElementById('scoreDisplay').innerText = result.score;
        document.getElementById('replyDisplay').innerHTML = result.reply;
        document.getElementById('status').innerText = "Task Complete!";
    }

    // --- VOICE LOGIC ---
    function toggleRecording() {
        if (!isRecording) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onresult = (event) => submitAudioTask(event.results[0][0].transcript);
            recognition.start();
            document.getElementById('recordBtn').classList.add('recording');
            isRecording = true;
        } else {
            recognition.stop();
            isRecording = false;
        }
    }

    async function submitAudioTask(transcript) {
        document.getElementById('status').innerText = "Analyzing speech...";
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ studentId, lessonId, prompt: currentPrompt, text: transcript, taskType: "speaking", type: "assessment" })
        });
        showFeedback(await response.json());
        document.getElementById('recordBtn').classList.remove('recording');
    }

    window.onload = loadData;
</script>
</body>
</html>
