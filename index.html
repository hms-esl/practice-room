<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELL Interactive Lesson</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --secondary: #50E3C2; --bg: #F4F7F9; --error: #FF4B2B; --success: #28a745; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; }
        
        /* Card Styles */
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .lesson-card { text-align: left; }
        .lesson-text { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; color: #333; }
        
        /* Button Styles */
        .btn { border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; margin: 10px 0; width: 100%; }
        .btn-listen { background: var(--secondary); color: white; }
        .btn-record { background: var(--primary); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .recording { background: var(--error) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* Speaking Task Styles */
        #status { margin-top: 15px; font-size: 0.9rem; color: #666; min-height: 40px; }
        #feedback-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: #eef7ff; display: none; text-align: left; }
        
        /* Comprehension Quiz Styles */
        .q-block { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .q-text { font-weight: 600; margin-bottom: 10px; }
        .q-option { display: block; margin-bottom: 8px; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; }
        .q-option:hover { background: #f0f8ff; }
        .q-option input { margin-right: 10px; }
        
        /* Quiz Feedback */
        .ai-feedback { margin-top: 10px; padding: 12px; background: #ffebee; border-left: 4px solid var(--error); border-radius: 4px; font-size: 0.9rem; display: none; }
        .correct-ans { background-color: #e8f5e9 !important; border: 1px solid var(--success); }
        .wrong-ans { background-color: #ffebee !important; border: 1px solid var(--error); }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card lesson-card">
        <h2>📚 Today's Lesson</h2>
        <div id="lessonContent" class="lesson-text">Loading your lesson materials...</div>
    </div>

    <div class="card">
        <h2 id="taskTitle">Loading Task...</h2>
        
        <div id="speakingUI" style="display: none;">
            <p id="promptText" style="font-style: italic; color: #555;">Fetching prompt...</p>
            <button class="btn btn-listen" onclick="listenToPrompt()">🔊 Listen to Prompt</button>
            <button id="recordBtn" class="btn btn-record" onclick="toggleRecording()">🎤 Start Recording</button>
            <div id="status">Ready to practice!</div>
            <div id="feedback-box">
                <strong>Score: <span id="scoreDisplay">-</span>/5</strong>
                <p id="replyDisplay"></p>
            </div>
        </div>

        <div id="comprehensionUI" style="display: none;">
            <div id="quizContainer"></div>
            <button id="submitQuizBtn" class="btn btn-record" onclick="submitQuiz()" style="display:none;">Submit Answers</button>
            <div id="quizStatus" style="margin-top: 15px; font-weight: 600;"></div>
        </div>

    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcev5ESj91kByxQJnVvJ1BfjQQZDKW2Y9COFSU4q3Yp227TJGLaswVcGKbg5exe52x/exec"; 

    // Get parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lessonId');
    const studentId = urlParams.get('studentId');
    const taskType = urlParams.get('taskType') || 'speaking'; 

    let currentPrompt = "";
    let isRecording = false;
    let recognition;
    let quizData = [];
    let attemptNum = 1;
    let scoreAttempt1 = 0;

    async function loadData() {
        if (!lessonId) {
            document.getElementById('lessonContent').innerText = "Missing Lesson ID. Please open from AppSheet.";
            document.getElementById('taskTitle').innerText = "Error";
            return;
        }

        try {
            const response = await fetch(`${SCRIPT_URL}?lessonId=${lessonId}`);
            const data = await response.json();
            
            document.getElementById('lessonContent').innerText = data.fullLesson || "No lesson text available.";

            if (taskType === 'comprehension') {
                document.getElementById('taskTitle').innerText = "🧠 Your Comprehension Task";
                document.getElementById('speakingUI').style.display = "none";
                document.getElementById('comprehensionUI').style.display = "block";
                buildQuiz(data.comprehension);
            } else {
                document.getElementById('taskTitle').innerText = "🗣️ Your Speaking Task";
                document.getElementById('comprehensionUI').style.display = "none";
                document.getElementById('speakingUI').style.display = "block";
                currentPrompt = data.prompt;
                document.getElementById('promptText').innerText = currentPrompt;
            }

        } catch (e) {
            document.getElementById('lessonContent').innerText = "Error loading data from Google Sheets.";
        }
    }

    // --- SPEAKING TASK LOGIC ---
    function listenToPrompt() {
        const msg = new SpeechSynthesisUtterance(currentPrompt);
        window.speechSynthesis.speak(msg);
    }

    function toggleRecording() {
        const btn = document.getElementById('recordBtn');
        const status = document.getElementById('status');

        if (!isRecording) {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => { submitToAI(event.results[0][0].transcript); };
            recognition.onerror = (event) => {
                status.innerText = "🛑 Error: " + event.error;
                btn.innerText = "Try Again";
                btn.disabled = false;
            };

            recognition.start();
            btn.innerText = "Stop & Submit";
            btn.classList.add('recording');
            status.innerText = "Listening...";
            isRecording = true;
        } else {
            recognition.stop();
            btn.innerText = "Processing...";
            btn.classList.remove('recording');
            btn.disabled = true;
            isRecording = false;
        }
    }

    async function submitToAI(transcript) {
        document.getElementById('status').innerText = "AI is grading your response...";
        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    studentId: studentId,
                    lessonId: lessonId,
                    prompt: currentPrompt,
                    text: transcript,
                    type: "assessment"
                })
            });
            const result = await response.json();
            document.getElementById('feedback-box').style.display = "block";
            document.getElementById('scoreDisplay').innerText = result.score;
            document.getElementById('replyDisplay').innerHTML = result.reply;
            document.getElementById('status').innerText = "Done! Review your feedback below.";
        } catch (e) {
            document.getElementById('status').innerText = "Error submitting. Check your internet.";
        }
        document.getElementById('recordBtn').innerText = "Start Recording";
        document.getElementById('recordBtn').disabled = false;
    }

    // --- COMPREHENSION TASK LOGIC ---
    function buildQuiz(rawQuizText) {
        if (!rawQuizText || rawQuizText.length < 20) {
            document.getElementById('quizContainer').innerText = "No comprehension questions found in this lesson.";
            return;
        }

        const blocks = ("\n" + rawQuizText).split(/\n(?=\d+\.\s)/).filter(c => c.trim().length > 0);
        quizData = [];

        blocks.forEach((block, index) => {
            let lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let q = { id: index, text: "", options: {}, answer: [], feedback: "", isMulti: false };

            lines.forEach(line => {
                if (/^[A-D]\)/i.test(line)) {
                    q.options[line.charAt(0).toUpperCase()] = line.substring(2).trim();
                } else if (/^Answer:/i.test(line)) {
                    let ansStr = line.substring(7).toUpperCase();
                    q.answer = ansStr.match(/[A-D]/g) || [];
                } else if (/^Feedback:/i.test(line)) {
                    q.feedback = line.substring(9).trim();
                } else if (Object.keys(q.options).length === 0) {
                    q.text += " " + line;
                }
            });

            q.text = q.text.replace(/❓ COMPREHENSION QUESTIONS/i, "").trim();
            if (q.text.toLowerCase().includes("choose all that apply")) q.isMulti = true;
            if (Object.keys(q.options).length > 0) quizData.push(q);
        });

        let html = "";
        quizData.forEach(q => {
            let inputType = q.isMulti ? "checkbox" : "radio";
            html += `<div class="q-block" id="qBlock_${q.id}">
                        <div class="q-text">${q.text}</div>`;
            
            for (const [letter, text] of Object.entries(q.options)) {
                html += `<label class="q-option" id="label_${q.id}_${letter}">
                            <input type="${inputType}" name="q_${q.id}" value="${letter}">
                            <strong>${letter})</strong> ${text}
                         </label>`;
            }
            html += `<div class="ai-feedback" id="fb_${q.id}"><strong>AI Guide:</strong> ${q.feedback}</div>
                     </div>`;
        });

        document.getElementById('quizContainer').innerHTML = html;
        if (quizData.length > 0) document.getElementById('submitQuizBtn').style.display = "block";
    }

    async function submitQuiz() {
        let currentScore = 0;
        let studentAnswersString = "";

        quizData.forEach(q => {
            let inputs = Array.from(document.querySelectorAll(`input[name="q_${q.id}"]:checked`));
            let selectedLetters = inputs.map(el => el.value).sort();
            let correctLetters = q.answer.sort();

            studentAnswersString += `Q${q.id + 1}:${selectedLetters.join("") || "None"} | `;

            let isCorrect = (selectedLetters.join(",") === correctLetters.join(","));

            document.querySelectorAll(`input[name="q_${q.id}"]`).forEach(inp => {
                document.getElementById(`label_${q.id}_${inp.value}`).classList.remove('correct-ans', 'wrong-ans');
            });

            if (isCorrect) {
                currentScore++;
                selectedLetters.forEach(letter => {
                    document.getElementById(`label_${q.id}_${letter}`).classList.add('correct-ans');
                });
                document.getElementById(`fb_${q.id}`).style.display = "none";
            } else {
                selectedLetters.forEach(letter => {
                    document.getElementById(`label_${q.id}_${letter}`).classList.add('wrong-ans');
                });
                correctLetters.forEach(letter => {
                     document.getElementById(`label_${q.id}_${letter}`).style.border = "1px dashed var(--success)";
                });
                
                if (attemptNum === 1) {
                    document.getElementById(`fb_${q.id}`).style.display = "block";
                }
            }
        });

        const statusLabel = document.getElementById('quizStatus');
        const submitBtn = document.getElementById('submitQuizBtn');

        if (attemptNum === 1) {
            scoreAttempt1 = currentScore;
            
            if (currentScore === quizData.length) {
                statusLabel.style.color = "var(--success)";
                statusLabel.innerText = `Perfect! You scored ${currentScore}/${quizData.length}. Saving results...`;
                submitBtn.style.display = "none";
                saveComprehension(studentAnswersString, scoreAttempt1, currentScore); 
            } else {
                statusLabel.style.color = "var(--error)";
                statusLabel.innerText = `You scored ${currentScore}/${quizData.length}. Please read the AI feedback and try again!`;
                submitBtn.innerText = "Submit Attempt 2";
                attemptNum = 2; 
            }
        
        } else if (attemptNum === 2) {
            statusLabel.style.color = currentScore === quizData.length ? "var(--success)" : "#333";
            statusLabel.innerText = `Final Score: ${currentScore}/${quizData.length}. Saving results...`;
            
            document.querySelectorAll('input').forEach(inp => inp.disabled = true);
            submitBtn.style.display = "none";
            
            saveComprehension(studentAnswersString, scoreAttempt1, currentScore); 
        }
    }

    async function saveComprehension(answersStr, attempt1Score, attempt2Score) {
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    studentId: studentId,
                    lessonId: lessonId,
                    taskType: "comprehension",
                    studentAnswers: answersStr,
                    score1: attempt1Score,
                    score2: attempt2Score
                })
            });
            document.getElementById('quizStatus').innerText += " Saved successfully!";
        } catch (e) {
            document.getElementById('quizStatus').innerText += " (Error saving to spreadsheet)";
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
