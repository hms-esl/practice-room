<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELL Interactive Lesson</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --secondary: #50E3C2; --bg: #F4F7F9; --error: #FF4B2B; --success: #28a745; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .lesson-card { text-align: left; }
        .lesson-text { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; color: #333; }
        .btn { border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; margin: 10px 0; width: 100%; }
        .btn-listen { background: var(--secondary); color: white; }
        .btn-record { background: var(--primary); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .recording { background: var(--error) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #status, #writingStatus { margin-top: 15px; font-size: 0.9rem; color: #666; min-height: 40px; }
        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: #eef7ff; display: none; text-align: left; }
        .q-block { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .q-text { font-weight: 600; margin-bottom: 10px; }
        .q-option { display: block; margin-bottom: 8px; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; }
        .q-option:hover { background: #f0f8ff; }
        .ai-feedback { margin-top: 10px; padding: 12px; background: #ffebee; border-left: 4px solid var(--error); border-radius: 4px; font-size: 0.9rem; display: none; }
        textarea { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-family: inherit; font-size: 1rem; box-sizing: border-box; resize: vertical; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card lesson-card">
        <h2>📚 Today's Lesson</h2>
        <div id="lessonContent" class="lesson-text">Loading materials...</div>
    </div>

    <div class="card">
        <h2 id="taskTitle">Loading Task...</h2>
        
        <div id="speakingUI" style="display: none;">
            <p id="promptText" style="font-style: italic; color: #555; margin-bottom: 15px;">Fetching prompt...</p>
            <button class="btn btn-listen" onclick="listenToPrompt()">🔊 Listen to Prompt</button>
            <button id="recordBtn" class="btn btn-record" onclick="toggleRecording()">🎤 Start Recording</button>
            <div id="status">Ready!</div>
            <div id="feedback-box" class="feedback-box">
                <strong>ELPA21 Score: <span id="scoreDisplay">-</span>/5</strong>
                <p id="replyDisplay"></p>
            </div>
        </div>

        <div id="writingUI" style="display: none;">
            <p id="writingPromptText" style="font-style: italic; color: #555; margin-bottom: 15px;">Fetching prompt...</p>
            <textarea id="writingInput" rows="6" placeholder="Type your response here..."></textarea>
            <button id="submitWritingBtn" class="btn btn-record" onclick="submitWriting()">📝 Submit Writing</button>
            <div id="writingStatus">Ready!</div>
            <div id="writing-feedback-box" class="feedback-box">
                <strong>ELPA21 Score: <span id="writingScoreDisplay">-</span>/5</strong>
                <p id="writingReplyDisplay"></p>
            </div>
        </div>

        <div id="comprehensionUI" style="display: none;">
            <div id="quizContainer"></div>
            <button id="submitQuizBtn" class="btn btn-record" onclick="submitQuiz()" style="display:none;">Submit Answers</button>
            <div id="quizStatus" style="margin-top: 15px; font-weight: 600;"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvucmpyniDeXtsY8fSIBVU57o0qfXtyIEXEoM0Pf2-sb3JbfnRQtY5ax1tj0C8fCJ9zw/exec"; 
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lessonId');
    const studentId = urlParams.get('studentId');
    const taskType = urlParams.get('taskType') || 'speaking';

    let currentPrompt = "";
    let isRecording = false;
    let recognition;
    let quizData = [];
    let attemptNum = 1;
    let scoreAttempt1 = 0;

    async function loadData() {
        if (!lessonId) {
            document.getElementById('lessonContent').innerText = "Missing Lesson ID.";
            return;
        }
        try {
            const response = await fetch(`${SCRIPT_URL}?lessonId=${lessonId}`);
            const data = await response.json();
            document.getElementById('lessonContent').innerText = data.fullLesson || "No text available.";
            
            currentPrompt = data.prompt || "Please discuss today's lesson.";

            if (taskType === 'comprehension') {
                document.getElementById('taskTitle').innerText = "🧠 Comprehension Task";
                document.getElementById('comprehensionUI').style.display = "block";
                buildQuiz(data.comprehension);
            } else if (taskType === 'writing') {
                document.getElementById('taskTitle').innerText = "📝 Writing Task";
                document.getElementById('writingUI').style.display = "block";
                document.getElementById('writingPromptText').innerText = currentPrompt;
            } else {
                document.getElementById('taskTitle').innerText = "🗣️ Speaking Task";
                document.getElementById('speakingUI').style.display = "block";
                document.getElementById('promptText').innerText = currentPrompt;
            }
        } catch (e) {
            document.getElementById('lessonContent').innerText = "Error connecting to Google Sheets.";
        }
    }

    function listenToPrompt() {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(currentPrompt));
    }

    // --- SPEAKING LOGIC ---
    function toggleRecording() {
        const btn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        if (!isRecording) {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.onresult = (e) => submitToAI(e.results[0][0].transcript);
            recognition.start();
            btn.innerText = "Stop & Submit";
            btn.classList.add('recording');
            status.innerText = "Listening...";
            isRecording = true;
        } else {
            recognition.stop();
            btn.innerText = "Processing...";
            btn.classList.remove('recording');
            status.innerText = "Grading against ELPA21 rubric...";
            isRecording = false;
        }
    }

    async function submitToAI(transcript) {
        try {
            const res = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    studentId, 
                    lessonId, 
                    taskType: "Speaking", 
                    prompt: currentPrompt, 
                    text: transcript, 
                    type: "assessment" 
                })
            });
            const result = await res.json();
            document.getElementById('feedback-box').style.display = "block";
            document.getElementById('scoreDisplay').innerText = result.score;
            document.getElementById('replyDisplay').innerHTML = result.reply;
            document.getElementById('status').innerText = "Saved to spreadsheet!";
        } catch (e) { 
            console.error(e); 
            document.getElementById('status').innerText = "Error saving. Please try again.";
        }
        document.getElementById('recordBtn').innerText = "Start Recording";
    }

    // --- WRITING LOGIC ---
    async function submitWriting() {
        const text = document.getElementById('writingInput').value;
        const btn = document.getElementById('submitWritingBtn');
        const status = document.getElementById('writingStatus');
        
        if (!text.trim()) {
            alert("Please type your answer first.");
            return;
        }
        
        btn.innerText = "Grading...";
        btn.disabled = true;
        status.innerText = "Grading against ELPA21 rubric...";
        
        try {
            const res = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    studentId, 
                    lessonId, 
                    taskType: "Writing", 
                    prompt: currentPrompt, 
                    text: text, 
                    type: "assessment" 
                })
            });
            const result = await res.json();
            document.getElementById('writing-feedback-box').style.display = "block";
            document.getElementById('writingScoreDisplay').innerText = result.score;
            document.getElementById('writingReplyDisplay').innerHTML = result.reply;
            status.innerText = "Saved to spreadsheet!";
        } catch (e) { 
            console.error(e); 
            status.innerText = "Error saving. Please try again.";
        }
        btn.innerText = "📝 Submit Writing";
        btn.disabled = false;
    }

    // --- COMPREHENSION LOGIC ---
    function buildQuiz(raw) {
        if (!raw) return;
        const blocks = ("\n" + raw).split(/\n(?=\d+\.\s)/).filter(c => c.trim().length > 0);
        blocks.forEach((block, index) => {
            let lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let q = { id: index, text: "", options: {}, answer: [], feedback: "" };
            lines.forEach(line => {
                if (/^[A-D]\)/i.test(line)) q.options[line.charAt(0).toUpperCase()] = line.substring(2).trim();
                else if (/^Answer:/i.test(line)) q.answer = line.substring(7).toUpperCase().match(/[A-D]/g) || [];
                else if (/^Feedback:/i.test(line)) q.feedback = line.substring(9).trim();
                else if (Object.keys(q.options).length === 0) q.text += " " + line;
            });
            if (Object.keys(q.options).length > 0) quizData.push(q);
        });
        let html = "";
        quizData.forEach(q => {
            html += `<div class="q-block">
                <div class="q-text">${q.text}</div>`;
            for (const [letter, text] of Object.entries(q.options)) {
                html += `<label class="q-option" id="label_${q.id}_${letter}"><input type="radio" name="q_${q.id}" value="${letter}"> <strong>${letter})</strong> ${text}</label>`;
            }
            html += `<div class="ai-feedback" id="fb_${q.id}"><strong>AI Guide:</strong> ${q.feedback}</div></div>`;
        });
        document.getElementById('quizContainer').innerHTML = html;
        document.getElementById('submitQuizBtn').style.display = "block";
    }

    async function submitQuiz() {
        let currentScore = 0;
        let answers = "";
        quizData.forEach(q => {
            let selected = document.querySelector(`input[name="q_${q.id}"]:checked`)?.value;
            let isCorrect = (selected === q.answer[0]);
            if (isCorrect) currentScore++;
            else if (attemptNum === 1) document.getElementById(`fb_${q.id}`).style.display = "block";
            answers += `Q${q.id+1}:${selected || "N"} `;
        });
        if (attemptNum === 1 && currentScore < quizData.length) {
            attemptNum = 2;
            document.getElementById('quizStatus').innerText = "Try again with AI feedback!";
            scoreAttempt1 = currentScore;
        } else {
            document.getElementById('quizStatus').innerText = "Saving results...";
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    studentId, 
                    lessonId, 
                    taskType: "Comprehension", 
                    studentAnswers: answers, 
                    score1: scoreAttempt1 || currentScore, 
                    score2: currentScore,
                    type: "assessment"
                })
            });
            document.getElementById('quizStatus').innerText = "Saved to spreadsheet!";
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
