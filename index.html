<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELL Interactive Lesson</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --secondary: #50E3C2; --bg: #F4F7F9; --error: #FF4B2B; --success: #28a745; --listening: #9b59b6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 700px; }
        
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: left; }
        
        .lesson-header { color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .lesson-section { color: #333; margin-top: 20px; margin-bottom: 5px; font-size: 1.2rem; }
        .lesson-text { font-size: 1rem; line-height: 1.6; color: #444; }
        
        .btn { border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; margin: 10px 0; width: 100%; }
        .btn-listen { background: var(--listening); color: white; }
        .btn-submit { background: var(--success); color: white; }
        
        .q-block { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-top: 15px; margin-bottom: 15px;}
        .q-option { display: block; margin-bottom: 8px; cursor: pointer; padding: 12px; border-radius: 8px; background: #f9f9f9; border: 1px solid #ddd; transition: 0.2s; }
        .q-option:hover { background: #f0f8ff; border-color: var(--primary); }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: #666; }
        
        #feedback-box { margin-top: 20px; padding: 20px; border-radius: 10px; background: #eef7ff; display: none; text-align: left; border-left: 5px solid var(--primary); }
        #feedback-box h4 { margin-top: 0; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <button class="btn btn-listen" id="readLessonBtn" onclick="readLessonAloud()">🔊 Read Lesson Aloud</button>
        <div id="lessonContent" class="lesson-text">Loading lesson details...</div>
    </div>

    <div class="card">
        <h2 id="taskTitle" style="text-align: center;">Task Loading...</h2>
        
        <div id="receptiveUI" style="display: none;">
            <button class="btn btn-listen" id="playAudioBtn" style="display: none;" onclick="playAudioTask()">🔊 1. Play Audio Story</button>
            <button class="btn btn-listen" style="background: #8e44ad;" onclick="playAllQuestions()">❓ Read Questions & Options</button>
            
            <div id="mc-container"></div>
            
            <button class="btn btn-submit" id="submitReceptiveBtn" onclick="submitReceptiveTask()">Submit Answers</button>
        </div>

        <div id="speakingUI" style="display: none;"><p>Speaking UI temporarily disabled.</p></div>
        <div id="writingUI" style="display: none;"><p>Writing UI temporarily disabled.</p></div>

        <div id="status"></div>
        
        <div id="feedback-box">
            <h4>🧠 AI Evaluation (<span id="scoreDisplay">-</span>/<span id="maxScoreDisplay">1</span>)</h4>
            <p id="replyDisplay"></p>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvucmpyniDeXtsY8fSIBVU57o0qfXtyIEXEoM0Pf2-sb3JbfnRQtY5ax1tj0C8fCJ9zw/exec"; 
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lessonId');
    const studentId = urlParams.get('studentId');
    
    // SAFE TASK TYPE: Forces lowercase and removes accidental spaces
    const rawTaskType = urlParams.get('taskType') || '';
    const taskType = rawTaskType.trim().toLowerCase(); 

    let cleanLessonTextForTTS = "";
    let audioScriptText = "";
    let questionsData = []; 

    async function loadData() {
        document.getElementById('status').innerText = "Fetching data from Google Sheets...";
        try {
            const response = await fetch(`${SCRIPT_URL}?lessonId=${lessonId}`);
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('lessonContent').innerText = "Error: " + data.error;
                document.getElementById('taskTitle').innerText = "Load Failed";
                return;
            }

            // Ensure we have a string to work with
            const safeFullLesson = String(data.fullLesson || '');

            formatAndDisplayLesson(safeFullLesson);
            document.getElementById('status').innerText = "";

            if (taskType === 'listening' || taskType === 'comprehension') {
                document.getElementById('receptiveUI').style.display = "block";
                document.getElementById('taskTitle').innerText = taskType === 'listening' ? '🎧 Listening Task' : '🧠 Comprehension Task';
                parseReceptiveTask(safeFullLesson, taskType);
            } else if (taskType === 'writing') {
                document.getElementById('writingUI').style.display = "block";
                document.getElementById('taskTitle').innerText = '✍️ Writing Task';
            } else {
                document.getElementById('speakingUI').style.display = "block";
                document.getElementById('taskTitle').innerText = '🗣️ Speaking Task';
            }
        } catch (e) { 
            // If it crashes, it will print the EXACT error on the screen
            document.getElementById('status').innerText = "System Error: " + e.message; 
            document.getElementById('taskTitle').innerText = "Task Failed to Load";
            console.error(e);
        }
    }

    function formatAndDisplayLesson(rawText) {
        if (!rawText) return;
        let coreLesson = rawText;
        
        if (rawText.match(/LISTENING TASK/i)) {
            coreLesson = rawText.split(/LISTENING TASK/i)[0].trim();
        } else if (rawText.match(/(🎧|🗣️|❓|📝)/)) {
            coreLesson = rawText.split(/(🎧|🗣️|❓|📝)/)[0].trim();
        }
        
        cleanLessonTextForTTS = coreLesson.replace(/[\*#]/g, ''); 
        coreLesson = coreLesson.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); 
        coreLesson = coreLesson.replace(/(🎯 TITLE:.*)/g, '<h3 class="lesson-header">$1</h3>');
        coreLesson = coreLesson.replace(/(📖 ANCHOR)/g, '<h4 class="lesson-section">$1</h4>');
        coreLesson = coreLesson.replace(/(📝 SUMMARY)/g, '<h4 class="lesson-section">$1</h4>');
        coreLesson = coreLesson.replace(/(🧠 ACADEMIC VOCABULARY)/g, '<h4 class="lesson-section">$1</h4>');
        coreLesson = coreLesson.replace(/\n/g, '<br>');
        
        document.getElementById('lessonContent').innerHTML = coreLesson;
    }

    function parseReceptiveTask(text, type) {
        if (!text) return;
        let taskArea = text;
        
        try {
            if (type === 'listening' && text.match(/LISTENING TASK/i)) {
                let parts = text.split(/LISTENING TASK/i);
                if (parts.length > 1) {
                    taskArea = parts[1];
                    taskArea = taskArea.split(/(COMPREHENSION TASK|SPEAKING TASK|WRITING TASK|🧠|🗣️|📝)/i)[0];
                }
            } else if (type === 'comprehension' && text.match(/COMPREHENSION TASK/i)) {
                let parts = text.split(/COMPREHENSION TASK/i);
                if (parts.length > 1) {
                    taskArea = parts[1];
                    taskArea = taskArea.split(/(SPEAKING TASK|WRITING TASK|LISTENING TASK|🗣️|📝|🎧)/i)[0];
                }
            }

            const scriptMatch = taskArea.match(/<AUDIO_SCRIPT>([\s\S]*?)<\/AUDIO_SCRIPT>/i);
            if (scriptMatch && scriptMatch[1]) {
                audioScriptText = scriptMatch[1].trim();
                document.getElementById('playAudioBtn').style.display = "block";
            } else {
                document.getElementById('playAudioBtn').style.display = "none";
            }

            questionsData = [];
            const blocks = taskArea.split(/<QUESTION>/i);
            if (blocks.length > 1) {
                blocks.slice(1).forEach(block => {
                    const splitBlock = block.split(/<\/QUESTION>/i);
                    if (splitBlock.length >= 2) {
                        const qText = splitBlock[0].trim();
                        const afterQ = splitBlock[1] || '';
                        
                        const options = afterQ.match(/[A-E][\)\.]\s+[^\n]+/gi) || [];
                        if (qText && options.length > 0) {
                            questionsData.push({ prompt: qText, options: options.map(o => o.trim()) });
                        }
                    }
                });
            }

            let optionsHTML = "";
            if (questionsData.length === 0) {
                optionsHTML = `<p style="color:red; font-style:italic;">Oops! Could not parse questions. The AI may have missed the &lt;QUESTION&gt; tags.</p>`;
                document.getElementById('maxScoreDisplay').innerText = "1";
            } else {
                questionsData.forEach((q, index) => {
                    optionsHTML += `<div class="q-block">`;
                    optionsHTML += `<p style="font-weight: bold; font-size: 1.1rem;">${index + 1}. ${q.prompt}</p>`;
                    q.options.forEach(opt => {
                        // Stripping HTML tags from the value to keep it clean for backend
                        let cleanValue = opt.replace(/<[^>]*>?/gm, ''); 
                        optionsHTML += `<label class="q-option"><input type="radio" name="q${index}" value="${cleanValue}"> ${opt}</label>`;
                    });
                    optionsHTML += `</div>`;
                });
                document.getElementById('maxScoreDisplay').innerText = questionsData.length; 
            }
            document.getElementById('mc-container').innerHTML = optionsHTML;

        } catch (err) {
            document.getElementById('mc-container').innerHTML = `<p style="color:red;">Error parsing task data: ${err.message}</p>`;
        }
    }

    function speakText(val) {
        if (!val) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(val);
        window.speechSynthesis.speak(msg);
    }
    
    function readLessonAloud() { speakText(cleanLessonTextForTTS); }
    function playAudioTask() { speakText(audioScriptText); }
    function playAllQuestions() { 
        if (questionsData.length === 0) return speakText("No questions found.");
        let fullSpeech = "";
        questionsData.forEach((q, i) => {
            fullSpeech += `Question ${i + 1}: ${q.prompt}. Options are: ${q.options.join(". ")}. `;
        });
        speakText(fullSpeech); 
    }

    async function submitReceptiveTask() {
        if (questionsData.length === 0) return alert("No questions available to submit.");
        
        let studentAnswers = [];
        let combinedPrompts = "";
        let combinedAnswers = "";

        for (let i = 0; i < questionsData.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) {
                alert(`Please select an answer for Question ${i + 1}.`);
                return;
            }
            studentAnswers.push(selected.value);
            combinedPrompts += `Q${i+1}: ${questionsData[i].prompt}\n`;
            combinedAnswers += `A${i+1}: ${selected.value}\n`;
        }
        
        const submitBtn = document.getElementById('submitReceptiveBtn');
        submitBtn.disabled = true;
        document.getElementById('status').innerText = "AI is grading your answers...";
        document.getElementById('feedback-box').style.display = 'none'; 
        
        const payload = { 
            studentId, 
            lessonId, 
            prompt: combinedPrompts.trim(), 
            text: combinedAnswers.trim(), 
            taskType: taskType, 
            type: "assessment" 
        };
        
        try {
            const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await response.json();
            
            document.getElementById('feedback-box').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = result.score !== undefined ? result.score : "N/A";
            document.getElementById('replyDisplay').innerText = result.reply || "Submission recorded.";
            document.getElementById('status').innerText = "✅ Evaluation Complete!";
        } catch (e) {
            document.getElementById('status').innerText = "Error grading submission.";
        } finally {
            submitBtn.disabled = false;
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
