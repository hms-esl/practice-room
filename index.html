<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMSD Practice Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-blue-600 p-6 text-white">
            <h1 id="taskTitle" class="text-2xl font-bold">Loading Lesson...</h1>
            <p id="taskSubtitle" class="text-blue-100 italic">Preparing your activities</p>
        </div>

        <div class="p-6 space-y-6">
            
            <div id="lessonContent" class="prose max-w-none text-slate-700">
                <p>Fetching your lesson data from the vault...</p>
            </div>

            <hr class="border-slate-100">

            <div id="taskInterface" class="space-y-4">
                
                <div id="ui-listening" class="hidden space-y-4">
                    <div class="flex gap-4">
                        <button onclick="speakText('audioScript')" class="flex-1 bg-blue-100 text-blue-700 p-4 rounded-xl font-bold hover:bg-blue-200 transition">🎧 Play Story</button>
                        <button onclick="speakText('question')" class="flex-1 bg-green-100 text-green-700 p-4 rounded-xl font-bold hover:bg-green-200 transition">❓ Play Question</button>
                    </div>
                </div>

                <div id="ui-speaking" class="hidden text-center space-y-4">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Record your response below</p>
                    <button id="micBtn" onclick="toggleRecording()" class="w-24 h-24 bg-red-500 text-white rounded-full shadow-lg hover:bg-red-600 transition flex items-center justify-center mx-auto">
                        <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-20a3 3 0 00-3 3v1h6V7a3 3 0 00-3-3z" />
                        </svg>
                    </button>
                    <p id="recStatus" class="text-slate-400 font-medium">Tap to start recording</p>
                </div>

                <div id="responseContainer" class="space-y-2">
                    <label class="block text-sm font-bold text-slate-600">Your Response:</label>
                    <textarea id="studentText" rows="4" class="w-full border-2 border-slate-200 rounded-xl p-4 focus:border-blue-500 outline-none transition" placeholder="Type or record your answer here..."></textarea>
                </div>

                <button id="submitBtn" onclick="submitToAppSheet()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-900 transition shadow-lg">Submit Assignment</button>
            </div>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center hidden text-white text-center z-50">
        <div class="p-8">
            <div id="loader" class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mx-auto mb-4"></div>
            <h2 id="overlayText" class="text-2xl font-bold">Processing your work...</h2>
        </div>
    </div>

    <script>
        // CONFIGURATION - CHANGE THIS TO YOUR WEB APP URL
        const WEB_APP_URL = "PASTE_YOUR_NEW_APPS_SCRIPT_DEPLOYMENT_URL_HERE";

        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('lessonId');
        const studentId = urlParams.get('studentId');
        const taskType = (urlParams.get('taskType') || 'listening').toLowerCase();

        let lessonData = {};
        let mediaRecorder;
        let audioChunks = [];
        let audioBase64 = "";
        let recognition;

        // 1. INITIALIZE PAGE
        async function init() {
            if (!lessonId) { alert("Missing Lesson ID"); return; }
            
            try {
                const response = await fetch(`${WEB_APP_URL}?lessonId=${lessonId}`);
                const data = await response.json();
                lessonData = parseLesson(data.fullLesson);
                renderPage();
            } catch (e) {
                document.getElementById('lessonContent').innerHTML = "Error loading lesson data.";
            }
        }

        // 2. PARSE LESSON TAGS
        function parseLesson(rawText) {
            const anchor = rawText.split("📝 SUMMARY")[0] || "";
            const audioScript = rawText.match(/<AUDIO_SCRIPT>([\s\S]*?)<\/AUDIO_SCRIPT>/)?.[1] || "";
            const question = rawText.match(/<QUESTION>([\s\S]*?)<\/QUESTION>/)?.[1] || "";
            const speakingPrompt = rawText.split("🗣️ SPEAKING TASK")[1]?.split("❓")[0] || "";
            
            return { anchor, audioScript, question, speakingPrompt, rawText };
        }

        // 3. RENDER UI BASED ON TASK TYPE
        function renderPage() {
            document.getElementById('taskTitle').innerText = taskType.charAt(0).toUpperCase() + taskType.slice(1) + " Task";
            
            if (taskType === "listening") {
                document.getElementById('ui-listening').classList.remove('hidden');
                document.getElementById('lessonContent').innerHTML = lessonData.anchor;
                document.getElementById('taskSubtitle').innerText = "Listen carefully to the story.";
            } else if (taskType === "speaking") {
                document.getElementById('ui-speaking').classList.remove('hidden');
                document.getElementById('lessonContent').innerHTML = `<div class='bg-yellow-50 p-4 border-l-4 border-yellow-400'>${lessonData.speakingPrompt}</div>`;
                document.getElementById('taskSubtitle').innerText = "Speak clearly into your microphone.";
                setupSTT();
            } else {
                document.getElementById('lessonContent').innerHTML = lessonData.rawText;
            }
        }

        // 4. AUDIO TOOLS (TTS)
        function speakText(key) {
            const text = lessonData[key];
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
        }

        // 5. SPEAKING LOGIC (STT + Recording)
        function setupSTT() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.interimResults = true;
                recognition.onresult = (e) => {
                    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
                    document.getElementById('studentText').value = transcript;
                };
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('micBtn');
            const status = document.getElementById('recStatus');

            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                if (recognition) recognition.stop();
                btn.classList.remove('recording-pulse', 'bg-red-700');
                status.innerText = "Processing audio...";
            } else {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => { audioBase64 = reader.result; status.innerText = "Recording saved!"; };
                };

                mediaRecorder.start();
                if (recognition) recognition.start();
                btn.classList.add('recording-pulse', 'bg-red-700');
                status.innerText = "🔴 RECORDING... Speak now";
            }
        }

        // 6. SUBMIT TO GOOGLE
        async function submitToAppSheet() {
            const text = document.getElementById('studentText').value;
            if (!text) { alert("Please provide a response."); return; }

            document.getElementById('overlay').classList.remove('hidden');

            const payload = {
                type: "assessment",
                taskType: taskType,
                studentId: studentId,
                lessonId: lessonId,
                text: text,
                prompt: taskType === "listening" ? lessonData.question : lessonData.speakingPrompt,
                audioBase64: audioBase64
            };

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('overlayText').innerHTML = `✅ Done!<br><br>Score: ${result.score}/5<br><p class='text-sm mt-2'>${result.reply}</p>`;
                
                setTimeout(() => window.close(), 5000);
            } catch (e) {
                alert("Submission failed. Check your internet connection.");
                document.getElementById('overlay').classList.add('hidden');
            }
        }

        init();
    </script>
</body>
</html>
