<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Room</title>
    <style>
        :root { --primary: #2C3E50; --secondary: #3498DB; --bg: #F5F7FA; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--primary); margin: 0; padding: 20px; display: flex; justify-content: center; }
        #app-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 600px; width: 100%; }
        h2 { color: var(--secondary); margin-bottom: 20px; border-bottom: 2px solid #ECF0F1; padding-bottom: 10px; }
        .instruction { font-size: 1.1em; margin-bottom: 20px; line-height: 1.5; }
        textarea { width: 100%; height: 100px; padding: 15px; border: 1px solid #BDC3C7; border-radius: 8px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; resize: vertical; }
        textarea:focus { outline: none; border-color: var(--secondary); }
        button { background-color: var(--secondary); color: white; border: none; padding: 15px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; transition: background-color 0.3s; font-weight: bold; margin-bottom: 15px; }
        button:hover { background-color: #2980B9; }
        button:disabled { background-color: #95A5A6; cursor: not-allowed; }
        .recording { background-color: #E74C3C !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        #status { text-align: center; font-weight: bold; color: #7F8C8D; margin-top: 15px; min-height: 20px; }
        #feedback-box { margin-top: 25px; padding: 20px; background-color: #E8F8F5; border-left: 5px solid #1ABC9C; border-radius: 4px; display: none; }
        .rubric-scores { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .score-row { display: flex; justify-content: space-between; }
        .score-val { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="app-container">
    <h2 id="taskHeader">Loading Task...</h2>
    <p class="instruction" id="promptDisplay">Please wait while we load your practice task.</p>

    <div id="writingUI" style="display:none;">
        <p style="font-weight:bold; margin-bottom: 5px;">Scaffolded Task:</p>
        <textarea id="textResponse" placeholder="Type your response here..."></textarea>
        
        <p style="font-weight:bold; margin-bottom: 5px;">Open-Ended Challenge:</p>
        <textarea id="textResponse2" placeholder="Type your response here..."></textarea>
        <button id="submitWritingBtn" onclick="submitWriting()">📤 Submit Task</button>
    </div>

    <div id="speakingUI" style="display:none;">
        <button id="recordBtn" onclick="toggleRecording()">🎤 Start Recording</button>
    </div>

    <div id="vocabUI" style="display:none;">
        <p style="font-weight:bold; margin-bottom: 5px;">Personal Definition:</p>
        <textarea id="defInput" placeholder="Define the word in your own words..."></textarea>
        
        <p style="font-weight:bold; margin-bottom: 5px;">Personal Sentence:</p>
        <textarea id="sentInput" placeholder="Use the word in a sentence..."></textarea>
        
        <p style="font-weight:bold; margin-bottom: 5px;">Example:</p>
        <textarea id="exampleInput" placeholder="Give an example..."></textarea>
        
        <p style="font-weight:bold; margin-bottom: 5px;">Non-Example:</p>
        <textarea id="nonExampleInput" placeholder="Give a non-example or opposite..."></textarea>

        <button id="submitVocabBtn" onclick="submitVocab()">📤 Submit Vocab Task</button>
    </div>

    <div id="status"></div>

    <div id="feedback-box">
        <strong>Overall AI Score: <span id="scoreDisplay">-</span>/5</strong>
        
        <div id="rubric-breakdown" style="display: none;">
            <div class="rubric-scores">
                <div class="score-row"><span>📚 <strong>Vocabulary</strong></span> <span class="score-val"><span id="vocabScore">-</span>/5</span></div>
                <div class="score-row"><span>🏗️ <strong>Syntax & Grammar</strong></span> <span class="score-val"><span id="syntaxScore">-</span>/5</span></div>
                <div class="score-row"><span>🗂️ <strong>Organization</strong></span> <span class="score-val"><span id="orgScore">-</span>/5</span></div>
                <div class="score-row"><span>🔄 <strong>Sentence Variety</strong></span> <span class="score-val"><span id="varietyScore">-</span>/5</span></div>
            </div>
        </div>
        
        <p id="replyDisplay" style="margin-top: 15px; line-height: 1.6;"></p>

        <div id="rubric-display-container" style="display:none; margin-top:20px; text-align: center;">
            <p style="font-size:0.85rem; color:#666; margin-bottom: 5px;"><strong>Your Grading Rubric:</strong></p>
            <img id="dynamicRubric" src="" alt="ELPA21 Grading Rubric" style="max-width:100%; border:1px solid #ccc; border-radius:5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzz6_u7u2h4jTclXw7nO7wQZtFh1K7mO_329E4v0R4eC-6tOq3d5Y9B9_hH_H1XJt_n/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('studentId') || "UnknownStudent";
    const lessonId = urlParams.get('lessonId') || "UnknownLesson";
    const taskTypeParam = (urlParams.get('taskType') || "speaking").toLowerCase();
    const currentVocabId = urlParams.get('vocabId') || ""; 
    
    let currentPrompt = "Tell me about what you learned today.";
    let targetTopic = "";
    
    let isRecording = false;
    let mediaRecorder;
    let audioChunks = [];
    let recognition;
    let finalTranscript = "";

    async function loadData() {
        document.getElementById('status').innerText = "Loading specific task details...";
        try {
            const response = await fetch(`${SCRIPT_URL}?lessonId=${lessonId}`);
            const data = await response.json();
            
            if (data.fullLesson) {
                const lessonText = data.fullLesson;
                
                // 1. Safe Title Extraction
                if (lessonText.includes("🎯 TITLE:")) {
                    targetTopic = lessonText.split("🎯 TITLE:")[1].split("\n")[0].trim();
                }
                
                // 2. Bulletproof Section Extractor
                const getSection = (startText, endText) => {
                    if (!lessonText.includes(startText)) return null;
                    let chunk = lessonText.substring(lessonText.indexOf(startText) + startText.length);
                    if (endText && chunk.includes(endText)) {
                        chunk = chunk.substring(0, chunk.indexOf(endText));
                    }
                    return chunk.trim();
                };

                // 3. Assign Prompts Safely
                if (taskTypeParam === "writing") {
                    currentPrompt = getSection("📝 WRITING TASK", "🤔 REFLECTION TASK") || "Please write about what you learned in this lesson.";
                } else if (taskTypeParam === "speaking") {
                    currentPrompt = getSection("🗣️ SPEAKING TASK", "📝 WRITING TASK") || "Please summarize the lesson out loud.";
                } else if (taskTypeParam === "reflection") {
                    let ref = getSection("🤔 REFLECTION TASK", "ELPA21"); 
                    if (!ref) ref = getSection("🤔 REFLECTION TASK", null);
                    currentPrompt = ref || "What did you think of this lesson? Explain your thoughts.";
                } else if (taskTypeParam === "vocab") {
                    currentPrompt = "Complete the Frayer Model fields below for your vocabulary word.";
                }
            } else {
                console.warn("No lesson text found in database for this ID.");
            }
        } catch (e) {
            console.error("Error loading task:", e);
            currentPrompt = "Could not load specific prompt. Please share your thoughts on the lesson.";
        }
        
        document.getElementById('taskHeader').innerText = taskTypeParam.charAt(0).toUpperCase() + taskTypeParam.slice(1) + " Task";
        document.getElementById('promptDisplay').innerText = currentPrompt;
        document.getElementById('status').innerText = "";

        // UI handling
        if (taskTypeParam === "writing" || taskTypeParam === "reflection") {
            document.getElementById('writingUI').style.display = "block";
        } else if (taskTypeParam === "vocab") {
            document.getElementById('vocabUI').style.display = "block";
        } else {
            document.getElementById('speakingUI').style.display = "block";
        }
    }

    async function submitWriting() {
        const text1 = document.getElementById('textResponse').value;
        const text2 = document.getElementById('textResponse2') ? document.getElementById('textResponse2').value : "";
        if (!text1) { alert("Please type something before submitting."); return; }
        
        document.getElementById('submitWritingBtn').disabled = true;
        document.getElementById('status').innerText = "Submitting to AI Tutor...";
        
        const payload = {
            studentId, lessonId, targetTopic, prompt: currentPrompt,
            text: text1, text2: text2, taskType: taskTypeParam, type: "assessment"
        };
        
        try {
            const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            showFeedback(await response.json());
        } catch(e) {
            document.getElementById('status').innerText = "Error submitting. Please try again.";
            console.error(e);
        }
    }

    async function submitVocab() {
        const def = document.getElementById('defInput').value;
        const sent = document.getElementById('sentInput').value;
        if (!def || !sent) { alert("Please fill out at least your personal definition and sentence."); return; }
        
        document.getElementById('submitVocabBtn').disabled = true;
        document.getElementById('status').innerText = "Submitting Vocabulary to AI Tutor...";
        
        const payload = {
            studentId, lessonId, vocabId: currentVocabId, taskType: "vocab",
            personalDef: def, personalSent: sent,
            example: document.getElementById('exampleInput').value,
            nonExample: document.getElementById('nonExampleInput').value,
            type: "assessment"
        };
        
        try {
            const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            showFeedback(await response.json());
        } catch(e) {
            document.getElementById('status').innerText = "Error submitting task.";
            console.error(e);
        }
    }

    async function toggleRecording() {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                finalTranscript = "";

                if ('webkitSpeechRecognition' in window) {
                    recognition = new webkitSpeechRecognition();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    recognition.onresult = (event) => {
                        let interim = "";
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + " ";
                            else interim += event.results[i][0].transcript;
                        }
                        document.getElementById('status').innerText = "Listening: " + interim;
                    };
                    recognition.start();
                }

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64Audio = reader.result.split(',')[1];
                        submitAudioTask(finalTranscript, base64Audio, 'audio/webm');
                    };
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('recordBtn').innerText = "🛑 Stop & Submit";
                isRecording = true;
            } catch (err) {
                alert("Please allow microphone permissions.");
            }
        } else {
            mediaRecorder.stop();
            if(recognition) recognition.stop();
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('recordBtn').innerText = "🎤 Start Recording";
            isRecording = false;
        }
    }

    async function submitAudioTask(transcript, audioBase64, mimeType) {
        document.getElementById('status').innerText = "AI is analyzing your speech & uploading file...";
        document.getElementById('recordBtn').disabled = true;

        const payload = { 
            studentId, lessonId, targetTopic, prompt: currentPrompt, 
            text: transcript || "No speech detected.", 
            audioBase64: audioBase64, mimeType: mimeType,
            taskType: "speaking", type: "assessment" 
        };

        try {
            const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            showFeedback(await response.json());
        } catch(e) {
            document.getElementById('status').innerText = "Error analyzing audio.";
            console.error(e);
        }
    }

    function showFeedback(result) {
        document.getElementById('feedback-box').style.display = "block";
        document.getElementById('scoreDisplay').innerText = result.score !== undefined ? result.score : "N/A";
        
        if (result.vocab && result.vocab !== "?") {
            document.getElementById('rubric-breakdown').style.display = "block";
            document.getElementById('vocabScore').innerText = result.vocab;
            document.getElementById('syntaxScore').innerText = result.syntax;
            document.getElementById('orgScore').innerText = result.org;
            document.getElementById('varietyScore').innerText = result.variety;
        }
        
        if (result.rubricUrl) {
            document.getElementById('dynamicRubric').src = result.rubricUrl;
            document.getElementById('rubric-display-container').style.display = "block";
        }
        
        document.getElementById('replyDisplay').innerText = result.reply;
        document.getElementById('status').innerText = "Task Complete!";
    }

    window.onload = loadData;
</script>
</body>
</html>
